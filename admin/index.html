<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>

<body class="dashboard">
    <aside class="sidebar">
        <h2>Admin Panel</h2>
        <nav>
            <a href="#" id="nav-dashboard" class="nav-link active">🏠 Dashboard</a>
            <a href="#" id="nav-projects" class="nav-link">📁 Projects</a>
            <a href="#" id="nav-blogs" class="nav-link">✍️ Blogs & Cases</a>
            <a href="#" id="nav-faqs" class="nav-link">❓ FAQs</a>
            <a href="#" id="nav-reviews" class="nav-link">⭐ Reviews</a>
            <a href="#" id="nav-messages" class="nav-link">📩 Messages</a>
            <hr style="margin: 1.5rem 0; opacity: 0.1;">
            <a href="#" id="nav-logout" class="nav-link" style="color: #f87171;">🚪 Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: center;">
            <h1 id="sectionTitle">Dashboard Overview</h1>
            <div id="userInfo"
                style="background: var(--bg-card); padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--border);">
                Admin
            </div>
        </header>

        <!-- Dashboard Home Section -->
        <section id="dashboardSection">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Projects</div>
                    <div class="stat-value" id="countProjects">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Blogs</div>
                    <div class="stat-value" id="countBlogs">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">New Messages</div>
                    <div class="stat-value" id="countMessages">0</div>
                </div>
            </div>

            <div class="card">
                <h3>System Status</h3>
                <p style="margin-top: 1rem; color: var(--text-muted);">Connected to Local Backend:
                    <strong>http://localhost:5000</strong></p>
            </div>
        </section>

        <!-- Dynamic Sections will be injected here via admin.js -->
        <div id="dynamicContent"></div>
    </main>

    <script src="admin.js"></script>
</body>

</html>
